name: Build Python Kivy APK

# Trigger on push to main branch
on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v3

      # 2. Install system dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-virtualenv git zip unzip
          pip install buildozer cython

      # 3. Build APK
      - name: Build APK
        run: |
          cd .   # if Kivy files are in repo root
          buildozer -v android debug

      # 4. Upload APK artifact
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: KivyApp-APK
          path: bin/*.apk
