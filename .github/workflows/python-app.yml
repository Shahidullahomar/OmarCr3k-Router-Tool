name: Build Kivy APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout repo
      - uses: actions/checkout@v3

      # 2. Install dependencies
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y python3-pip python3-virtualenv git zip unzip
          pip install buildozer cython

      # 3. Build APK
      - name: Build APK
        run: |
          buildozer -v android debug

      # 4. Upload APK
      - name: Upload APK
        uses: actions/upload-artifact@v4   # ← must be v4
        with:
          name: KivyApp-APK
          path: bin/*.apk
